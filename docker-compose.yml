services:
  python:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - commentlab_tmp:/app/.tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys, urllib.request; sys.exit(0 if urllib.request.urlopen(\"http://127.0.0.1:8001/health\", timeout=5).status == 200 else 1)'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "3000"
      PYTHON_DASHSCOPE_SERVICE_URL: http://python:8001
      NUXT_PYTHON_DASHSCOPE_SERVICE_URL: http://python:8001
      TEMP_VIDEO_DIR: /app/.tmp/douyin-downloads
      NUXT_TEMP_VIDEO_DIR: /app/.tmp/douyin-downloads
      AUTH_LOCK_FILE: /app/.state/auth-lock.json
      NUXT_AUTH_LOCK_FILE: /app/.state/auth-lock.json
      NUXT_ALIYUN_API_KEY: ${ALIYUN_API_KEY:-}
      NUXT_ALIYUN_BASE_URL: ${ALIYUN_BASE_URL:-https://dashscope.aliyuncs.com/api/v1}
      NUXT_ALIYUN_MODEL: ${ALIYUN_MODEL:-qwen3.5-omni-plus}
      NUXT_TIKHUB_API_KEY: ${TIKHUB_API_KEY:-}
      NUXT_TIKHUB_BASE_URL: ${TIKHUB_BASE_URL:-https://api.tikhub.io}
      NUXT_MAX_VIDEO_SIZE_MB: ${MAX_VIDEO_SIZE_MB:-100}
      NUXT_PUBLIC_DEFAULT_MODEL: ${ALIYUN_MODEL:-qwen3.5-omni-plus}
      NUXT_PUBLIC_DEBUG_RAW_ENABLED: ${DEBUG_RAW_ENABLED:-false}
    volumes:
      - commentlab_tmp:/app/.tmp
      - commentlab_auth:/app/.state
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      python:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://127.0.0.1:3000/api/health\").then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  commentlab_tmp:
  commentlab_auth:
