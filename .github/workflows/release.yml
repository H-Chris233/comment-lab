name: Desktop Release Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  draft-release:
    if: startsWith(github.ref, 'refs/heads/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles deb,rpm"
          - platform: macos-latest
            args: "--bundles dmg"
          - platform: windows-latest
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python (pkg build compatibility)
        if: matrix.platform == 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            ffmpeg \
            patchelf

      - name: Install ffmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install ffmpeg -y

      - name: Prepare portable ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p .tools/ffmpeg
          curl -L "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -o .tools/ffmpeg/ffmpeg.tar.xz
          tar -xf .tools/ffmpeg/ffmpeg.tar.xz -C .tools/ffmpeg
          FFMPEG_PATH="$(find .tools/ffmpeg -type f -name ffmpeg | head -n 1)"
          echo "FFMPEG_BINARY=$GITHUB_WORKSPACE/$FFMPEG_PATH" >> "$GITHUB_ENV"

      - name: Prepare portable ffmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p .tools/ffmpeg
          curl -L "https://evermeet.cx/ffmpeg/ffmpeg-7.1.1.zip" -o .tools/ffmpeg/ffmpeg.zip
          unzip -o .tools/ffmpeg/ffmpeg.zip -d .tools/ffmpeg
          chmod +x .tools/ffmpeg/ffmpeg
          echo "FFMPEG_BINARY=$GITHUB_WORKSPACE/.tools/ffmpeg/ffmpeg" >> "$GITHUB_ENV"

      - name: Prepare portable ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .tools/ffmpeg | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ".tools/ffmpeg/ffmpeg.zip"
          Expand-Archive -Path ".tools/ffmpeg/ffmpeg.zip" -DestinationPath ".tools/ffmpeg" -Force
          $ffmpeg = Get-ChildItem -Path ".tools/ffmpeg" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          "FFMPEG_BINARY=$($ffmpeg.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify ffmpeg
        shell: bash
        run: |
          if [[ -n "${FFMPEG_BINARY:-}" ]]; then
            "$FFMPEG_BINARY" -version
          else
            ffmpeg -version
          fi

      - name: Prepare desktop sidecars
        env:
          FFMPEG_BINARY: ${{ env.FFMPEG_BINARY }}
        run: pnpm run desktop:prepare

      - name: Build bundles and create/update draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: draft-main
          releaseName: Comment Lab Draft (main)
          releaseBody: |
            Automated draft desktop bundles from main.
            Commit: ${{ github.sha }}
          releaseDraft: true
          prerelease: true
          includeRelease: true
          uploadPlainBinary: false
          args: ${{ matrix.args }}

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles deb,rpm"
          - platform: macos-latest
            args: "--bundles dmg"
          - platform: windows-latest
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python (pkg build compatibility)
        if: matrix.platform == 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            ffmpeg \
            patchelf

      - name: Install ffmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install ffmpeg -y

      - name: Prepare portable ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p .tools/ffmpeg
          curl -L "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -o .tools/ffmpeg/ffmpeg.tar.xz
          tar -xf .tools/ffmpeg/ffmpeg.tar.xz -C .tools/ffmpeg
          FFMPEG_PATH="$(find .tools/ffmpeg -type f -name ffmpeg | head -n 1)"
          echo "FFMPEG_BINARY=$GITHUB_WORKSPACE/$FFMPEG_PATH" >> "$GITHUB_ENV"

      - name: Prepare portable ffmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p .tools/ffmpeg
          curl -L "https://evermeet.cx/ffmpeg/ffmpeg-7.1.1.zip" -o .tools/ffmpeg/ffmpeg.zip
          unzip -o .tools/ffmpeg/ffmpeg.zip -d .tools/ffmpeg
          chmod +x .tools/ffmpeg/ffmpeg
          echo "FFMPEG_BINARY=$GITHUB_WORKSPACE/.tools/ffmpeg/ffmpeg" >> "$GITHUB_ENV"

      - name: Prepare portable ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .tools/ffmpeg | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ".tools/ffmpeg/ffmpeg.zip"
          Expand-Archive -Path ".tools/ffmpeg/ffmpeg.zip" -DestinationPath ".tools/ffmpeg" -Force
          $ffmpeg = Get-ChildItem -Path ".tools/ffmpeg" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          "FFMPEG_BINARY=$($ffmpeg.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify ffmpeg
        shell: bash
        run: |
          if [[ -n "${FFMPEG_BINARY:-}" ]]; then
            "$FFMPEG_BINARY" -version
          else
            ffmpeg -version
          fi

      - name: Prepare desktop sidecars
        env:
          FFMPEG_BINARY: ${{ env.FFMPEG_BINARY }}
        run: pnpm run desktop:prepare

      - name: Build bundles and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Comment Lab ${{ github.ref_name }}
          releaseBody: |
            Automated desktop release for ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
          includeRelease: true
          uploadPlainBinary: false
          args: ${{ matrix.args }}
